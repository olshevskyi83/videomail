{% extends "layout.html" %}
{% block body %}
<h3>Підтримка</h3>

<style>
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.cardv{border:1px solid #ddd;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
.row{display:flex;justify-content:space-between;gap:8px;align-items:center}
.badge{padding:2px 8px;border-radius:999px;border:1px solid #ccc;font-size:12px}
.meta{font-size:12px;color:#666}
.mono{font-family:monospace}
.actions{display:flex;gap:8px;align-items:center}
input.reply{width:100%;padding:6px;border:1px solid #ddd;border-radius:8px}
.btn{padding:6px 10px;border:1px solid #888;border-radius:8px;background:#f8f8f8}
.btn.red{background:#d93025;color:#fff;border-color:#d93025}
.btn.green{background:#27a815;color:#fff;border-color:#25d934}
</style>

<div class="cards">
{% for t in items %}
  <div class="cardv">
    <div class="row">
      <strong>#{{t.id}} — {{t.nickname}}</strong>
      <span class="badge">{{t.status}}</span>
    </div>
    <div class="meta mono">{{t.user_key}}</div>
    <div><strong>User_message:</strong><br>{{t.message}}</div>
    <div><strong>Support:</strong><br>{{t.reply or '—'}}</div>
    <div class="actions">
      <form method="post" action="/support/reply" style="flex:1;display:flex;gap:6px">
        <input type="hidden" name="id" value="{{t.id}}">
        <input class="reply" type="text" name="reply" placeholder="Відповісти...">
        <button type="submit" class="btn green">Надіслати</button>
      </form>
      <form method="post" action="{{ url_for('support_delete', ticket_id=t.id) }}" onsubmit="return confirm('Видалити розмову #{{t.id}}?')">
        <button class="btn red" type="submit">Видалити</button>
      </form>
    </div>
  </div>
{% endfor %}
</div>
{% endblock %}
