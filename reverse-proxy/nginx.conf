# /etc/nginx/nginx.conf

user  nginx;
worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  access_log /dev/stdout;
  error_log  /dev/stderr notice;

  # Docker DNS резолвер, щоб імена core-api/user-ui/admin-panel резолвились
  resolver 127.0.0.11 ipv6=off valid=10s;

  # Трохи безпечних заголовків
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy no-referrer-when-downgrade always;

  # Для WebSocket/HTTP/1.1
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ---- Апстріми (назви збігаються з іменами сервісів у docker-compose) ----
  upstream core_api { server core-api:8000; }
  upstream user_ui  { server user-ui:80; }
  upstream admin_ui { server admin-panel:80; }

  # ---- HTTP → HTTPS редірект для обох хостів ----
  server {
    listen 80;
    server_name kiosk.192-168-88-248.nip.io admin.192-168-88-248.nip.io;
    return 301 https://$host$request_uri;
  }

  # --- KIOSK (користувацький UI) --------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name kiosk.192-168-88-248.nip.io;

    ssl_certificate     /etc/tls/fullchain.pem;
    ssl_certificate_key /etc/tls/privkey.pem;

    client_max_body_size 200m;
    proxy_read_timeout   300s;
    proxy_send_timeout   300s;
    send_timeout         300s;

    # /api → core-api
    location ^~ /api/ {
      proxy_pass http://core_api;                # зверни увагу на трейлінг-слеш
      proxy_http_version 1.1;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  https;
      proxy_set_header Authorization      $http_authorization;
      proxy_set_header Upgrade            $http_upgrade;
      proxy_set_header Connection         $connection_upgrade;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
    }

    # усе інше → user-ui (статичка і SPA)
    location / {
      proxy_pass http://user_ui;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection      "";
      proxy_read_timeout 600s;
      proxy_buffering off;
    }
  }

  # --- ADMIN (адмін-панель + API) -------------------------------------------
  server {
    listen 443 ssl;
    http2 on;
    server_name admin.192-168-88-248.nip.io;

    ssl_certificate     /etc/tls/fullchain.pem;
    ssl_certificate_key /etc/tls/privkey.pem;

    # /api/* → core-api
    location ^~ /api/ {
      proxy_pass http://core_api;
      proxy_http_version 1.1;
      proxy_set_header Host               $host;
      proxy_set_header X-Real-IP          $remote_addr;
      proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto  https;
      proxy_set_header Authorization      $http_authorization;
      proxy_set_header Upgrade            $http_upgrade;
      proxy_set_header Connection         $connection_upgrade;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_redirect off;
      client_max_body_size 512m;
    }

    # SPA адмінки
    location / {
      proxy_pass http://admin_ui;
      proxy_http_version 1.1;
      proxy_set_header Host            $host;
      proxy_set_header X-Real-IP       $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Connection      "";
      proxy_read_timeout 600s;
      proxy_buffering off;
    }
  }
}
